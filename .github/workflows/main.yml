name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # flutter gen-l10n ya NO es necesario aquí:
      # con "generate: true" en pubspec.yaml, "flutter build" lo hace automáticamente.
      # Dejarlo causaba un error de "tool not found" en algunas versiones del runner.

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
