name: Build Flutter APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      # Genera los íconos del launcher con ImageMagick (ya viene en ubuntu-latest)
      # Sin esto el build falla con "mipmap/ic_launcher not found"
      - name: Generate launcher icons
        run: |
          for dir in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p android/app/src/main/res/$dir
          done
          convert -size 48x48   xc:#1565C0 android/app/src/main/res/mipmap-mdpi/ic_launcher.png
          convert -size 72x72   xc:#1565C0 android/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert -size 96x96   xc:#1565C0 android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert -size 144x144 xc:#1565C0 android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert -size 192x192 xc:#1565C0 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          for size in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android/app/src/main/res/mipmap-$size/ic_launcher.png \
               android/app/src/main/res/mipmap-$size/ic_launcher_round.png
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - uses: actions/upload-artifact@v4
        with:
          name: chat-app-apk
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
